// ===============================
// CRIA MENU E CARDS AUTOMATICAMENTE
// ===============================
const menuTabs = document.getElementById("menuTabs");
const areas = document.getElementById("areas");

Object.keys(categorias).forEach((cat, idx) => {
    menuTabs.innerHTML += `
        <button onclick="abrirSecao.call(this, '${cat}')" class="${idx===0 ? 'active' : ''}">
            ${cat.toUpperCase()}
        </button>
    `;

    areas.innerHTML += `<div id="${cat}" class="section ${idx===0 ? 'active' : ''}"></div>`;
});

Object.keys(categorias).forEach(cat => {
    const div = document.getElementById(cat);
    categorias[cat].forEach(item => {
        div.innerHTML += `
            <div class="card">
                <img src="${item.foto}" alt="${item.nome}">
                <h3>${item.nome}</h3>
                <p><strong>€${item.preco.toFixed(2)}</strong></p>
                <button onclick="addItem('${item.nome}', ${item.preco})">Adicionar</button>
            </div>
        `;
    });
});


// ==================
// FUNÇÃO DE ABRIR ABA
// ==================
function abrirSecao(cat) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(cat).classList.add("active");

    document.querySelectorAll(".menu-centralizado button").forEach(btn => btn.classList.remove("active"));
    this.classList.add("active");
}


// =======================
// ABRIR A ABA POR HASH
// =======================
window.onload = () => {
    const hash = window.location.hash.replace("#","").trim();
    if (hash && document.getElementById(hash)) {
        const botao = document.querySelector(`button[onclick*="${hash}"]`);
        if (botao) abrirSecao.call(botao, hash);
    }
};


// ================================
// CARRINHO
// ================================
let pedido = JSON.parse(localStorage.getItem("pedido")) || [];

function addItem(nome, preco) {
    const i = pedido.findIndex(item => item.nome === nome);
    if (i >= 0) pedido[i].quantidade++;
    else pedido.push({nome, preco, quantidade: 1});
    salvarPedido();
}

function salvarPedido() {
    localStorage.setItem("pedido", JSON.stringify(pedido));
    atualizarCarrinho();
}

function atualizarCarrinho() {
    const lista = document.getElementById("lista");
    const contador = document.getElementById("contador-itens");
    let total = 0;

    lista.innerHTML = pedido.map((p, i) => {
        total += p.preco * p.quantidade;
        return `
            <li class="carrinho-item">
                <span>${p.nome} — €${p.preco.toFixed(2)}</span>

                <div class="quantidade-box">
                    <button onclick="alterarQuantidade(${i}, -1)">−</button>
                    <span>${p.quantidade}</span>
                    <button onclick="alterarQuantidade(${i}, 1)">+</button>
                </div>

                <button class="remover" onclick="removerItem(${i})">❌</button>
            </li>
        `;
    }).join("");

    document.getElementById("total").textContent = total.toFixed(2);
    contador.textContent = pedido.reduce((sum,p)=>sum+p.quantidade,0);
}

function alterarQuantidade(i, delta){
    pedido[i].quantidade += delta;
    if (pedido[i].quantidade <= 0) removerItem(i);
    salvarPedido();
}

function removerItem(i){
    pedido.splice(i,1);
    salvarPedido();
}

function abrirCarrinho(){
    atualizarCarrinho();
    document.getElementById("carrinho-box").classList.add("carrinho-open");
}

function fecharCarrinho(){
    document.getElementById("carrinho-box").classList.remove("carrinho-open");
}

function enviarWhatsApp(){
    const nome = document.getElementById("nomeCliente").value;
    if(!nome.trim()){
        alert("⚠ Digite seu nome!");
        return;
    }

    const obs = document.getElementById("obs").value;
    const numero = "351930580520";

    let texto = `Pedido Dom Bistrô%0ACliente: ${nome}%0A%0AItens:%0A`;

    pedido.forEach(p=>{
        texto += `- ${p.nome} x${p.quantidade} (€${(p.preco*p.quantidade).toFixed(2)})%0A`;
    });

    texto += `%0ATotal: €${pedido.reduce((t,p)=>t+p.preco*p.quantidade,0).toFixed(2)}%0A%0AObservações:%0A${obs}`;

    window.open(`https://wa.me/${numero}?text=${texto}`, '_blank');

    localStorage.removeItem("pedido");
    pedido = [];
    atualizarCarrinho();
}


// ========================
// MENU MOBILE
// ========================
function toggleMenu(){
    document.getElementById("menuTabs").classList.toggle("menu-open");
}
